<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Torne-se Anunciante - TripBrasil</title>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Red+Hat+Display:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Red Hat Display', sans-serif;
            color: white;
            min-height: 100vh;
            background-color: #0c0c0c;
        }

        /* HEADER FIXO E TRANSLÚCIDO */
        #header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1100;
            background: rgba(0, 0, 0, 0.2) !important;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        /* HERO / BACKGROUND */
        .hero {
            min-height: 100vh;
            width: 100%;
            background:
                linear-gradient(rgba(0, 0, 0, 0.65), rgba(0, 0, 0, 0.65)),
                url('assets/img/fundo.webp'),
                url('https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?q=80&w=1920'); /* Fundo corporativo/cidade moderno */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            padding-top: 120px; 
            padding-bottom: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* CARD DE VIDRO CENTRALIZADO */
        .advertiser-card {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 40px;
            padding: 50px 60px;
            position: relative;
            width: 100%;
            max-width: 800px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
            z-index: 10;
        }

        /* BOTÃO VOLTAR */
        .btn-back {
            position: absolute;
            top: 30px;
            left: 30px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 45px;
            height: 45px;
            z-index: 20;
        }

        .btn-back:hover {
            background: white;
            color: black;
            transform: translateX(-5px);
        }

        /* TÍTULO PRINCIPAL */
        .main-title {
            font-family: 'Outfit', sans-serif;
            font-size: 2.4rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 40px;
            letter-spacing: 0.5px;
        }

        /* BLOCO DE INFORMAÇÕES BÁSICAS */
        .info-block {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 24px;
            padding: 35px;
            margin-bottom: 35px;
        }

        .info-block-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 25px;
            color: rgba(255, 255, 255, 0.95);
        }

        /* ESTILIZAÇÃO DOS INPUTS */
        .form-label-custom {
            font-family: 'Outfit', sans-serif;
            font-size: 1.1rem;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 8px;
            display: block;
        }

        .form-control-custom {
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            color: white;
            font-family: 'Red Hat Display', sans-serif;
            font-size: 1.1rem;
            padding: 12px 18px;
            width: 100%;
            transition: all 0.3s ease;
        }

        .form-control-custom:focus {
            background: rgba(255, 255, 255, 0.12);
            border-color: #70AE6E;
            box-shadow: 0 0 15px rgba(112, 174, 110, 0.25);
            outline: none;
            color: white;
        }

        /* BOTÃO AGUARDAR APROVAÇÃO (VIDRO ESCURO) */
        .btn-submit-dark {
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            color: white;
            font-family: 'Outfit', sans-serif;
            font-size: 1.15rem;
            font-weight: 600;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 50px;
            padding: 14px 45px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn-submit-dark:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border-color: #70AE6E;
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(112, 174, 110, 0.2);
        }

        /* ELEMENTO GRÁFICO (MALAS NO CANTO INFERIOR DIREITO) */
        .bags-illustration {
            position: absolute;
            bottom: 20px;
            right: 30px;
            width: 110px;
            height: auto;
            opacity: 0.85;
            pointer-events: none;
            z-index: 1;
        }

        /* TOAST DE NOTIFICAÇÃO SUCESSO */
        .custom-toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(20, 40, 25, 0.85);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid #70AE6E;
            color: #daffde;
            padding: 16px 28px;
            border-radius: 16px;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            gap: 12px;
            transform: translateY(150px);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 2000;
        }

        .custom-toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        @media (max-width: 768px) {
            .advertiser-card {
                padding: 40px 25px;
                margin: 0 15px;
            }
            .main-title { font-size: 1.9rem; }
            .info-block { padding: 20px; }
            .bags-illustration { display: none; } /* Oculta em telas mobile para evitar sobreposição */
            .custom-toast { left: 20px; right: 20px; bottom: 20px; text-align: center; justify-content: center; }
        }
    </style>
</head>

<body>

    <div id="header"></div>

    <div id="successToast" class="custom-toast">
        <i class="fa-solid fa-clock-rotate-left" style="color: #70AE6E; font-size: 1.4rem;"></i>
        <span>Solicitação enviada! Aguarde a análise da nossa equipe.</span>
    </div>

    <main class="hero">
        <div class="container d-flex justify-content-center align-items-center">
            
            <div class="advertiser-card">
                
                <button class="btn-back" onclick="window.history.back()" title="Voltar">
                    <i class="fa-solid fa-arrow-left"></i>
                </button>

                <h1 class="main-title">Torne-se anunciante</h1>

                <form id="advertiserForm">
                    
                    <div class="info-block">
                        <div class="info-block-title">Informações Básicas</div>
                        
                        <div class="row g-4">
                            <div class="col-12">
                                <label class="form-label-custom">Nome completo</label>
                                <input type="text" class="form-control-custom" required placeholder="Digite seu nome completo">
                            </div>
                            
                            <div class="col-12">
                                <label class="form-label-custom">CNPJ</label>
                                <input type="text" class="form-control-custom" required placeholder="00.000.000/0001-00" id="cnpjInput">
                            </div>
                        </div>
                    </div>

                    <div class="text-center">
                        <button type="submit" class="btn-submit-dark">
                            <i class="fa-solid fa-paper-plane"></i>
                            <span>Aguardar aprovação</span>
                        </button>
                    </div>

                </form>

                <svg class="bags-illustration" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="40" y="35" width="45" height="50" rx="6" fill="#70AE6E" fill-opacity="0.3" stroke="#70AE6E" stroke-width="2.5"/>
                    <path d="M52 35V25C52 22.8 53.8 21 56 21H69C71.2 21 73 22.8 73 25V35" stroke="#70AE6E" stroke-width="2.5" stroke-linecap="round"/>
                    <rect x="40" y="55" width="45" height="6" fill="#70AE6E" fill-opacity="0.5"/>
                    
                    <rect x="15" y="48" width="40" height="38" rx="6" fill="#1f3d52" fill-opacity="0.4" stroke="white" stroke-width="2.5"/>
                    <path d="M27 48V40C27 38.3 28.3 37 30 37H40C41.7 37 43 38.3 43 40V48" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
                    <rect x="25" y="48" width="5" height="38" fill="rgba(255,255,255,0.15)"/>
                    <rect x="40" y="48" width="5" height="38" fill="rgba(255,255,255,0.15)"/>
                    <circle cx="20" cy="86" r="4" fill="white"/>
                    <circle cx="50" cy="86" r="4" fill="white"/>
                </svg>

            </div>

        </div>
    </main>

    <script>
        // INTERCEPTADOR DE ENVIO DO FORMULÁRIO COM FEEDBACK DE MENSAGEM FLUTUANTE
        document.getElementById('advertiserForm').addEventListener('submit', function(event) {
            event.preventDefault(); // Impede o recarregamento real da página

            const toast = document.getElementById('successToast');
            toast.classList.add('show'); // Exibe a mensagem flutuante elegante na tela

            // Limpa os campos do formulário para simular a conclusão do fluxo
            this.reset();

            // Esconde a notificação de sucesso após 4 segundos
            setTimeout(() => {
                toast.classList.remove('show');
            }, 4000);
        });

        // Injeção dinâmica do menu superior unificado
        fetch('header.html')
            .then(response => {
                if (!response.ok) throw new Error("Erro CORS");
                return response.text();
            })
            .then(data => {
                document.getElementById('header').innerHTML = data;
            })
            .catch(err => {
                document.getElementById('header').innerHTML = `
                    <nav style="padding: 20px 50px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.5); border-bottom: 1px solid rgba(255,255,255,0.1);">
                        <a href="#" style="color: white; font-weight: 700; font-size: 1.5rem; text-decoration: none; font-family: 'Outfit';">TripBrasil</a>
                        <div style="display: flex; gap: 30px; font-family: 'Outfit';">
                            <a href="#" style="color: white; text-decoration: none; opacity: 0.8;">Explorar</a>
                            <a href="#" style="color: #70AE6E; text-decoration: none; font-weight: 600;">Anuncie seu estabelecimento</a>
                            <a href="#" style="color: white; text-decoration: none; opacity: 0.8;">Perfil</a>
                        </div>
                    </nav>
                `;
            });
    </script>
</body>
</html>
