<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TripBrasil - Meus Roteiros</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Passero+One&family=Patrick+Hand&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <style>
        :root {
            --font-main: 'Patrick Hand', cursive;
            --font-accent: 'Passero One', cursive;
            --bg-quadro: #FFF9C9;
            --header-roteiros: #FFC13A;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            font-family: var(--font-main);
            background-color: #fff;
            font-size: 1.3rem;
            color: #000;
        }

        .font-passero { font-family: var(--font-accent); }

        body {
            font-family: 'Red Hat Display';
            margin: 0;
            padding: 0;
            /* Fundo com imagem e fading */
            background-image: linear-gradient(rgba(255,255,255,0.8), rgba(255,255,255,0.5)), url('assets/img/fundo.webp');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        header {
            background-color: rgba(245, 245, 245, 0.9);
            border-bottom: 1px solid #ccc;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav a {
            margin: 0 10px;
            text-decoration: none;
            color: #333;
            font-weight: bold;
        }

        h1 {
            font-family: 'Outfit';
            font-size: 10vw;
            margin-top: 5vw;
            margin-bottom: 5px;
            line-height: 1.2;
        }

        h2 {
            font-family: 'Red Hat Display';
            font-size: 3vw;
            margin-top: 5px;  
            margin-bottom: 5px;
            line-height: 1.2;
        }

        .left-padding {
            padding-left: 4vw;
        }

        button {
            background-color: #70AE6E;
            border: none;
            color: white;
            padding: 14px 28px;
            text-align: center;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.2s;
        }

        button:hover {
            background-color: #50A04E;
            transform: translateY(-2px);
        }

        /* Conteúdo Principal */
        .main-container {
            flex: 1;
            padding: 40px 10%;
            position: relative;
            text-align: center;
        }

        .back-button {
            position: absolute;
            top: 20px;
            left: 30px;
            color: #000;
            text-decoration: none;
        }

        .intro-text {
            font-size: 1.8rem;
            margin-bottom: 30px;
            line-height: 1.2;
        }

        /* Quadro de Roteiros */
        .roteiros-box {
            border: 2px solid #000;
            border-radius: 35px;
            background-color: var(--bg-quadro);
            position: relative;
            padding: 70px 40px 40px 40px;
            margin-top: 50px;
            min-height: 420px;
        }

        .roteiros-header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            background-color: var(--header-roteiros);
            padding: 8px 0;
            border-bottom: 2px solid #000;
            font-size: 1.5rem;
            border-top-left-radius: 33px;
            border-top-right-radius: 33px;
        }

        /* Divisória de Bolas Vertical */
        .vertical-divider {
            position: absolute;
            left: 50%;
            top: 65px;
            bottom: 30px;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            align-items: center;
            width: 20px;
            z-index: 2;
        }

        .sphere {
            width: 12px;
            height: 12px;
            background-color: #000;
            border-radius: 50%;
        }

        .column-title {
            font-size: 1.4rem;
            margin-bottom: 25px;
            text-align: left;
        }

        .list-roteiros {
            list-style: none;
            padding: 0;
            text-align: left;
        }

        .list-roteiros li {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
            padding-right: 20px;
        }

        /* Mudança para Asterisco */
        .list-roteiros li span::before {
            content: "*";
            margin-right: 10px;
            font-size: 1.5rem;
            vertical-align: middle;
            line-height: 0;
        }

        .icon-actions {
            display: flex;
            gap: 12px;
            font-size: 1.1rem;
        }

        .btn-criar {
            background-color: #000;
            color: #fff !important;
            border: none;
            border-radius: 12px;
            padding: 2px 15px;
            font-size: 0.85rem;
            text-decoration: none;
            text-transform: uppercase;
        }

        @media (max-width: 768px) {
            .vertical-divider { display: none; }
            .col-md-6 { border-bottom: 1px solid #000; margin-bottom: 20px; padding-bottom: 20px; }
            .main-container { padding: 40px 5%; }
        }
    </style>
</head>
<body>
    <div id = "header"></div>

    <main class="main-container">
        <a href="#" class="back-button"><i class="bi bi-arrow-left fs-3"></i></a>

        <div class="intro-text">
            Olá <span class="font-passero">viajante</span>, querendo criar ou<br>
            visualizar um roteiro exclusivo para suas<br>
            viagens?<br>
            VAMOS NESSA!!
        </div>

        <div class="roteiros-box shadow-sm">
            <div class="roteiros-header">Meus Roteiros</div>
            
            <div class="vertical-divider">
                <div class="sphere"></div>
                <div class="sphere"></div>
                <div class="sphere"></div>
                <div class="sphere"></div>
                <div class="sphere"></div>
                <div class="sphere"></div>
                <div class="sphere"></div>
                <div class="sphere"></div>
            </div>

            <div class="row">
                <div class="col-md-6 pe-md-5">
                    <h2 class="column-title font-passero text-uppercase">salvos</h2>
                    <ul class="list-roteiros">
                        <li>
                            <span>Rio de Janeiro (Cristo Redentor)</span>
                            <div class="icon-actions">
                                <i class="bi bi-pencil"></i>
                                <i class="bi bi-trash"></i>
                            </div>
                        </li>
                        <li>
                            <span>Foz do Iguaçu (Cataratas)</span>
                            <div class="icon-actions">
                                <i class="bi bi-pencil"></i>
                                <i class="bi bi-trash"></i>
                            </div>
                        </li>
                    </ul>
                </div>

                <div class="col-md-6 ps-md-5">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h2 class="column-title font-passero text-uppercase m-0">criados</h2>
                        <a href="#" class="btn-criar">CRIAR</a>
                    </div>
                    <ul class="list-roteiros">
                        <li>
                            <span>Salvador</span>
                            <div class="icon-actions">
                                <i class="bi bi-pencil"></i>
                                <i class="bi bi-trash"></i>
                            </div>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
<script>
fetch('header.html')
  .then(response => {
    if (!response.ok) throw new Error("Erro ao carregar cabeçalho");
    return response.text();
  })
  .then(data => {
    document.getElementById('header').innerHTML = data;
  })
  .catch(err => console.error(err));
</script>
</html>
