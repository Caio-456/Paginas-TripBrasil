<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>TripBrasil - Meu Perfil</title>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Red+Hat+Display:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Red Hat Display', sans-serif;
            color: white;
            min-height: 100vh;
            background-color: #0c0c0c;
        }

        /* HEADER FIXO E TRANSLÚCIDO */
        #header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1100;
            background: rgba(0, 0, 0, 0.2) !important;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        /* HERO / BACKGROUND */
        .hero {
            min-height: 100vh;
            width: 100%;
            background:
                linear-gradient(rgba(0, 0, 0, 0.65), rgba(0, 0, 0, 0.65)),
                url('assets/img/fundo.webp'),
                url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=1920'); /* Fallback internet */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            padding-top: 140px; 
            padding-bottom: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* CARD DE PERFIL AMPLIADO (GLASSMORPHISM) */
        .profile-card {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 40px;
            padding: 90px 60px 60px 60px;
            position: relative;
            width: 100%;
            max-width: 900px; /* QUADRO AMPLIADO */
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
            text-align: center;
        }

        /* FOTO DE PERFIL (AVATAR) */
        .profile-avatar-container {
            position: absolute;
            top: -75px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }

        .profile-avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        /* BOTÃO VOLTAR */
        .btn-back {
            position: absolute;
            top: 30px;
            left: 30px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 45px;
            height: 45px;
        }

        .btn-back:hover {
            background: white;
            color: black;
            transform: translateX(-5px);
        }

        /* SAUDAÇÃO */
        .profile-greeting {
            font-family: 'Outfit', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            color: white;
            margin-bottom: 45px;
        }

        /* GRID DE AÇÕES */
        .profile-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }

        /* BOTÕES DE AÇÃO */
        .btn-profile-action {
            background: rgba(255, 255, 255, 0.92);
            color: #1a1a1a;
            font-family: 'Red Hat Display', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            border: none;
            border-radius: 50px;
            padding: 18px 30px;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 15px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            text-decoration: none;
        }

        .btn-profile-action:hover {
            background: #ffffff;
            transform: translateY(-4px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.3);
            color: #000;
        }

        .btn-profile-action i {
            font-size: 1.2rem;
            width: 25px;
            text-align: center;
        }

        /* Estilo para Excluir */
        .btn-danger-custom:hover {
            background: #ffebee;
            color: #d32f2f;
        }

        @media (max-width: 768px) {
            .profile-grid { grid-template-columns: 1fr; }
            .profile-card { padding: 90px 30px 40px 30px; margin: 0 15px; }
            .profile-greeting { font-size: 1.5rem; }
        }
    </style>
</head>

<body>

    <div id="header"></div>

    <main class="hero">
        <div class="container d-flex justify-content-center">
            
            <div class="profile-card">
                
                <button class="btn-back" onclick="window.history.back()" title="Voltar">
                    <i class="fa-solid fa-arrow-left"></i>
                </button>

                <div class="profile-avatar-container">
                    <img src="assets/img/mariana.webp" alt="Mariana Silva" class="profile-avatar" onerror="this.src='https://images.unsplash.com/photo-1494790108377-be9c29b29330?q=80&w=200'">
                </div>

                <div class="profile-greeting">
                    Olá, Mariana Silva!
                </div>

                <div class="profile-grid">
                    
                    <a href="alterar-senha.html" class="btn-profile-action">
                        <i class="fa-solid fa-lock"></i>
                        <span>Alterar Senha</span>
                    </a>

                    <button class="btn-profile-action">
                        <i class="fa-solid fa-user-pen"></i>
                        <span>Editar informações</span>
                    </button>

                    <a href="excluir-conta.html" class="btn-profile-action btn-danger-custom">
                        <i class="fa-solid fa-trash-can"></i>
                        <span>Excluir conta</span>
                    </a>

                    <button class="btn-profile-action">
                        <i class="fa-solid fa-heart"></i>
                        <span>Favoritos</span>
                    </button>

                    <a href="meus-roteiros.html" class="btn-profile-action">
                        <i class="fa-solid fa-map-location-dot"></i>
                        <span>Meus roteiros</span>
                    </a>

                    <button class="btn-profile-action">
                        <i class="fa-solid fa-star"></i>
                        <span>Minhas avaliações</span>
                    </button>

                </div>

            </div>

        </div>
    </main>

    <script>
        // Carrega o cabeçalho oficial ou injeta o reserva (CORS)
        fetch('header.html')
            .then(response => {
                if (!response.ok) throw new Error("Erro ao carregar");
                return response.text();
            })
            .then(data => {
                document.getElementById('header').innerHTML = data;
            })
            .catch(err => {
                document.getElementById('header').innerHTML = `
                    <nav style="padding: 20px 50px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.5); border-bottom: 1px solid rgba(255,255,255,0.1);">
                        <a href="#" style="color: white; font-weight: 700; font-size: 1.5rem; text-decoration: none; font-family: 'Outfit';">TripBrasil</a>
                        <div style="display: flex; gap: 30px;">
                            <a href="#" style="color: white; text-decoration: none; opacity: 0.8;">Explorar</a>
                            <a href="#" style="color: #70AE6E; text-decoration: none; font-weight: 600;">Perfil</a>
                        </div>
                    </nav>
                `;
            });
    </script>
</body>
</html>
