<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>TripBrasil - Avaliar Experiência</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Red+Hat+Display:wght@400;500;700&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Red Hat Display', sans-serif;
            color: white;
            min-height: 100vh;
            background-color: #121212;
        }

        /* HEADER FIXO */
        #header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1100;
            background: rgba(18, 18, 18, 0.2) !important;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        /* HERO / BACKGROUND */
        .hero {
            min-height: 100vh;
            width: 100%;
            background:
                linear-gradient(rgba(0, 0, 0, 0.65), rgba(0, 0, 0, 0.65)),
                url('assets/img/fundo.webp'),
                url('https://images.unsplash.com/photo-1516026672322-bc52d61a55d5?q=80&w=1920');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            padding-top: 100px;
            padding-bottom: 60px;
            display: flex;
            align-items: center;
        }

        /* CARD PRINCIPAL (GLASSMORPHISM) */
        .main-content {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 32px;
            padding: 40px;
            position: relative;
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
        }

        /* BOTÃO VOLTAR */
        .btn-back {
            position: absolute;
            top: 25px;
            left: 25px;
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
        }

        .btn-back:hover {
            transform: translateX(-3px);
            color: #FFB74D;
        }

        /* TÍTULO E BANNER */
        .review-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .review-header h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .review-header p {
            font-size: 1.2rem;
            color: #FFB74D;
            font-weight: 500;
        }

        .place-banner {
            width: 100%;
            height: 220px;
            border-radius: 20px;
            object-fit: cover;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* FORMULÁRIO */
        label {
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            margin-bottom: 10px;
            display: block;
            font-size: 1.1rem;
        }

        .custom-textarea {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 15px;
            color: white;
            outline: none;
            resize: none;
            transition: 0.3s;
        }

        .custom-textarea:focus {
            border-color: #FFB74D;
            background: rgba(0, 0, 0, 0.3);
        }

        /* ESTRELAS */
        .star-rating {
            display: flex;
            gap: 8px;
            color: #FFC107;
            font-size: 1.5rem;
            margin-bottom: 25px;
            cursor: pointer;
        }

        /* UPLOAD DE IMAGEM */
        .upload-box {
            border: 2px dashed rgba(255, 255, 255, 0.3);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            background: rgba(255, 255, 255, 0.03);
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 35px;
        }

        .upload-box:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: #FFB74D;
        }

        .upload-box i {
            font-size: 1.5rem;
            display: block;
            margin-bottom: 10px;
            opacity: 0.7;
        }

        /* BOTÃO ENVIAR */
        .btn-submit-review {
            width: 100%;
            background: #FFB74D;
            color: #121212;
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 1.2rem;
            padding: 15px;
            border: none;
            border-radius: 50px;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-submit-review:hover {
            background: #FFA726;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255, 183, 77, 0.3);
        }

        @media (max-width: 768px) {
            .main-content { padding: 30px 20px; }
            .review-header h1 { font-size: 1.8rem; }
        }
    </style>
</head>

<body>

    <div id="header"></div>

    <main class="hero">
        <div class="container">
            
            <div class="main-content">
                <button class="btn-back" onclick="window.history.back()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="currentColor" viewBox="0 0 16 16">
                        <path fill-rule="evenodd" d="M12 8a.5.5 0 0 1-.5.5H5.707l2.147 2.146a.5.5 0 0 1-.708.708l-3-3a.5.5 0 0 1 0-.708l3-3a.5.5 0 1 1 .708.708L5.707 7.5H11.5a.5.5 0 0 1 .5.5z"/>
                    </svg>
                </button>

                <div class="review-header">
                    <h1>Avalie Sua Experiência</h1>
                    <p>Museu da Inconfidência, Ouro Preto</p>
                </div>

                <img src="https://i.ytimg.com/vi/zMF1gsCxd1A/hq720.jpg?sqp=-oaymwEhCK4FEIIDSFryq4qpAxMIARUAAAAAGAElAADIQj0AgKJD&rs=AOn4CLCOrxj0RSFyV4xm7qDx2aOxi2xvAw" alt="Museu da inconfidência" class="place-banner">

                <form>
                    <div class="mb-4">
                        <label>Compartilhe detalhes da sua visita</label>
                        <textarea class="custom-textarea" rows="4" placeholder="Digite aqui..."></textarea>
                    </div>

                    <div class="mb-4">
                        <label>Nota</label>
                        <div class="star-rating">
                            <span>☆</span><span>☆</span><span>☆</span><span>☆</span><span>☆</span>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label>Adicione foto da sua visita</label>
                        <div class="upload-box">
                            <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" fill="currentColor" class="bi bi-camera mb-2" viewBox="0 0 16 16" style="opacity: 0.6;">
                                <path d="M15 12a1 1 0 0 1-1 1H2a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1h1.172a3 3 0 0 0 2.12-.879l.83-.828A1 1 0 0 1 6.827 3h2.344a1 1 0 0 1 .707.293l.828.828A3 3 0 0 0 12.828 5H14a1 1 0 0 1 1 1v6zM2 4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-1.172a2 2 0 0 1-1.414-.586l-.828-.828A2 2 0 0 0 9.172 2H6.828a2 2 0 0 0-1.414.586l-.828.828A2 2 0 0 1 3.172 4H2z"/>
                                <path d="M8 11a2.5 2.5 0 1 1 0-5 2.5 2.5 0 0 1 0 5zm0 1a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7zM3 6.5a.5.5 0 1 1-1 0 .5.5 0 0 1 1 0z"/>
                            </svg>
                            <p style="margin:0; font-size: 0.9rem; opacity: 0.7;">Insira sua imagem aqui</p>
                        </div>
                    </div>

                    <button type="submit" class="btn-submit-review">Enviar Avaliação</button>
                </form>

            </div>

        </div>
    </main>

    <script>
        // Injeção do cabeçalho dinâmico
        fetch('header.html')
            .then(response => {
                if (!response.ok) throw new Error("Erro ao carregar cabeçalho");
                return response.text();
            })
            .then(data => {
                document.getElementById('header').innerHTML = data;
            })
            .catch(err => {
                console.warn("Fallback: Injetando menu padrão.");
                document.getElementById('header').innerHTML = `
                    <nav style="padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; background: rgba(18,18,18,0.7); border-bottom: 1px solid rgba(255,255,255,0.1);">
                        <a href="#" style="color: white; font-weight: 700; font-size: 1.5rem; text-decoration: none; font-family: 'Outfit';">TripBrasil</a>
                        <div style="display: flex; gap: 25px;">
                            <a href="#" style="color: white; text-decoration: none; opacity: 0.8;">Explorar</a>
                            <a href="#" style="color: #70AE6E; text-decoration: none; font-weight: 600;">Perfil</a>
                        </div>
                    </nav>
                `;
            });
    </script>
</body>

</html>
