<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TripBrasil - Criar Roteiro com IA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Passero+One&family=Patrick+Hand&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <style>
        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            font-family: var(--font-main);
            font-size: 1.2rem; /* Patrick Hand flui melhor um pouco maior */
        }

        /* Layout */
        .main-wrapper {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 220px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid #dee2e6;
            padding: 20px;
        }

        .city-title {
            font-family: var(--font-title);
            font-size: 1.8rem;
            list-style: none;
            padding: 0;
            margin-top: 15px;
            display: flex;
            align-items: center;
        }

        .city-title::before {
            content: "▪";
            margin-right: 10px;
            font-size: 1rem;
        }

        /* Área de Conteúdo */
        .content-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: #fff;
        }

        .top-actions {
            padding: 15px 30px;
            text-align: right;
        }

        .btn-save {
            text-decoration: none;
            color: #000;
            font-family: var(--font-main);
            font-size: 1.1rem;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .btn-save i {
            color: #70c99a; /* Cor verde do ícone do wireframe */
            font-size: 1.6rem;
        }

        /* Chat Input */
        .chat-container {
            margin-top: auto;
            padding: 30px 10%;
        }

        .input-group-custom {
            border: 2px solid var(--accent-color);
            border-radius: 30px;
            padding: 8px 20px;
            background-color: #eee;
            display: flex;
            align-items: center;
        }

        .input-group-custom input {
            border: none;
            background: transparent;
            width: 100%;
            outline: none;
            font-family: var(--font-main);
            font-size: 1.2rem;
        }

        .flip-flops {
            width: 35px;
            opacity: 0.7;
        }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .chat-container { padding: 20px 5%; }
        }

        body {
            font-family: 'Red Hat Display';
            margin: 0;
            padding: 0;
            /* Fundo com imagem e fading */
            background-image: linear-gradient(rgba(255,255,255,0.8), rgba(255,255,255,0.5)), url('assets/img/fundo.webp');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        header {
            background-color: rgba(245, 245, 245, 0.9);
            border-bottom: 1px solid #ccc;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }


        h1 {
            font-family: 'Outfit';
            font-size: 10vw;
            margin-top: 5vw;
            margin-bottom: 5px;
            line-height: 1.2;
        }

        h2 {
            font-family: 'Red Hat Display';
            font-size: 3vw;
            margin-top: 5px;  
            margin-bottom: 5px;
            line-height: 1.2;
        }

        .left-padding {
            padding-left: 4vw;
        }

        button {
            background-color: #70AE6E;
            border: none;
            color: white;
            padding: 14px 28px;
            text-align: center;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.2s;
        }

        button:hover {
            background-color: #50A04E;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div id = "header"></div>

    <div class="main-wrapper">
        
        <aside class="sidebar">
            <a href="#" class="text-dark"><i class="bi bi-arrow-left fs-4"></i></a>
            <div class="city-title">Salvador</div>
        </aside>

        <main class="content-area">
            <div class="top-actions">
                <a href="#" class="btn-save">
                    Salvar novo roteiro 
                    <i class="bi bi-plus-circle-fill"></i>
                </a>
            </div>

            <div class="flex-grow-1 overflow-auto">
                </div>

            <div class="chat-container">
                <div class="input-group-custom shadow-sm">
                    <input type="text" placeholder="Digite aqui:">
                    <img src="https://cdn-icons-png.flaticon.com/512/3159/3159074.png" class="flip-flops" alt="icon">
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
<script>
fetch('header.html')
  .then(response => {
    if (!response.ok) throw new Error("Erro ao carregar cabeçalho");
    return response.text();
  })
  .then(data => {
    document.getElementById('header').innerHTML = data;
  })
  .catch(err => console.error(err));
</script>
</html>
