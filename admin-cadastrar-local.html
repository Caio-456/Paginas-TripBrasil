<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>TripBrasil - Cadastrar Local</title>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Red+Hat+Display:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Red Hat Display', sans-serif;
            color: white;
            min-height: 100vh;
            background-color: #0c0c0c;
        }

        /* HEADER FIXO E TRANSLÚCIDO */
        #header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1100;
            background: rgba(0, 0, 0, 0.2) !important;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        /* HERO / BACKGROUND AREA */
        .admin-hero {
            min-height: 100vh;
            width: 100%;
            background:
                linear-gradient(rgba(0, 0, 0, 0.75), rgba(0, 0, 0, 0.75)),
                url('assets/img/fundo.webp');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            padding-top: 110px;
            padding-bottom: 40px;
            display: flex;
            align-items: center;
        }

        /* PAINEL PRINCIPAL GLASSMORPHISM */
        .admin-panel-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 32px;
            padding: 35px;
            width: 100%;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        /* BOTÃO VOLTAR */
        .btn-back-admin {
            position: absolute;
            top: 35px;
            left: 35px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: white;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 42px;
            height: 42px;
            z-index: 20;
        }

        .btn-back-admin:hover {
            background: white;
            color: black;
            transform: translateX(-3px);
        }

        /* TÍTULO DA SEÇÃO */
        .admin-section-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 35px;
            padding-left: 55px;
            color: rgba(255, 255, 255, 0.95);
        }

        /* LAYOUT DUAS COLUNAS */
        .form-layout-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }

        /* GRUPO DE INPUTS CLÁSSICOS */
        .form-group-custom {
            margin-bottom: 20px;
        }

        .form-group-custom label {
            display: block;
            font-family: 'Outfit', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: rgba(255, 255, 255, 0.85);
        }

        .form-control-custom {
            width: 100%;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            padding: 12px 16px;
            color: white;
            font-size: 0.95rem;
            transition: all 0.3s;
        }

        .form-control-custom:focus {
            background: rgba(255, 255, 255, 0.12);
            border-color: #70AE6E;
            box-shadow: 0 0 10px rgba(112, 174, 110, 0.2);
            outline: none;
        }

        /* RADIOS E CHECKBOXES */
        .radio-inline-group {
            display: flex;
            gap: 20px;
            align-items: center;
            padding-top: 4px;
        }

        .radio-item, .checkbox-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.95rem;
            cursor: pointer;
        }

        .radio-item input, .checkbox-item input {
            accent-color: #70AE6E;
            width: 16px;
            height: 16px;
        }

        /* ÁREA DE PREÇO DINÂMICO */
        .price-container {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        /* MAPA DE LOCALIZAÇÃO */
        .map-section-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 12px;
            color: rgba(255, 255, 255, 0.9);
        }

        .map-wrapper-box {
            width: 100%;
            height: 140px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
            margin-bottom: 25px;
        }

        .map-wrapper-box iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* SESSÃO DE FOTOS */
        .photos-container-box {
            background: rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 25px;
            height: fit-content;
        }

        .photos-box-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 20px;
            color: white;
        }

        .photos-grid-layout {
            display: grid;
            grid-template-columns: 1.3fr 1fr;
            gap: 15px;
        }

        .main-upload-trigger {
            background: rgba(255, 255, 255, 0.03);
            border: 2px dashed rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            min-height: 180px;
            transition: all 0.2s;
            text-align: center;
            padding: 15px;
        }

        .main-upload-trigger:hover {
            border-color: #70AE6E;
            background: rgba(112, 174, 110, 0.04);
        }

        .main-upload-trigger i {
            font-size: 2rem;
            color: rgba(255, 255, 255, 0.4);
        }

        .main-upload-trigger span {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.6);
        }

        .secondary-thumbnails-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .thumb-upload-slot {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            cursor: pointer;
            color: rgba(255, 255, 255, 0.2);
            font-size: 1.3rem;
            transition: 0.2s;
        }

        .thumb-upload-slot:hover {
            border-color: rgba(255, 255, 255, 0.25);
            color: rgba(255, 255, 255, 0.5);
        }

        .btn-delete-thumb {
            position: absolute;
            top: 6px;
            right: 6px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: rgba(255, 255, 255, 0.7);
            width: 24px;
            height: 24px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-delete-thumb:hover {
            background: #ff5252;
            color: white;
            border-color: #ff5252;
        }

        /* BOTÃO SALVAR MASTER */
        .btn-submit-save {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            background: #70AE6E;
            color: white;
            border: none;
            border-radius: 50px;
            padding: 14px 35px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 25px rgba(112, 174, 110, 0.2);
            margin-top: 25px;
        }

        .btn-submit-save:hover {
            background: #5c945a;
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(112, 174, 110, 0.3);
        }

        /* RESPONSIVIDADE */
        @media (max-width: 991px) {
            .form-layout-grid { grid-template-columns: 1fr; gap: 30px; }
        }
    </style>
</head>

<body>

    <div id="header"></div>

    <main class="admin-hero">
        <div class="container">

            <div class="admin-panel-card">

                <button class="btn-back-admin" onclick="window.location.href='admin-locais.html'" title="Voltar para a gestão">
                    <i class="fa-solid fa-arrow-left"></i>
                </button>

                <h1 class="admin-section-title">Cadastro de Local</h1>

                <form onsubmit="handleSubmit(event)">
                    <div class="form-layout-grid">

                        <div class="left-form-column">

                            <div class="form-group-custom">
                                <label for="nomeLocal">Nome:</label>
                                <input type="text" id="nomeLocal" class="form-control-custom" required placeholder="Digite o nome do local">
                            </div>

                            <div class="form-group-custom">
                                <label for="descLocal">Descrição:</label>
                                <textarea id="descLocal" class="form-control-custom" rows="3" required placeholder="Descreva os principais detalhes do local..."></textarea>
                            </div>

                            <div class="form-group-custom">
                                <label>Tipo:</label>
                                <div class="radio-inline-group">
                                    <label class="radio-item">
                                        <input type="radio" name="tipoLocal" value="estabelecimento" checked> Estabelecimento
                                    </label>
                                    <label class="radio-item">
                                        <input type="radio" name="tipoLocal" value="ponto_turistico"> Ponto turístico
                                    </label>
                                </div>
                            </div>

                            <div class="form-group-custom">
                                <label>Preço de entrada:</label>
                                <div class="price-container">
                                    <label class="checkbox-item">
                                        <input type="checkbox" id="chkGratuito" checked onchange="togglePriceInput(this)"> Gratuito
                                    </label>
                                    <input type="text" id="txtPreco" class="form-control-custom" style="max-width: 150px; display: none;" placeholder="Valor (R$)">
                                </div>
                            </div>

                            <div class="form-group-custom">
                                <label for="selectEstado">Estado:</label>
                                <select id="selectEstado" class="form-control-custom" required>
                                    <option value="" disabled selected>Selecione um estado</option>
                                    <option value="ES">Espírito Santo</option>
                                    <option value="RJ">Rio de Janeiro</option>
                                    <option value="SP">São Paulo</option>
                                    <option value="MG">Minas Gerais</option>
                                </select>
                            </div>

                            <div class="form-group-custom">
                                <label for="selectCidade">Cidade:</label>
                                <select id="selectCidade" class="form-control-custom" required>
                                    <option value="" disabled selected>Selecione uma cidade</option>
                                    <option value="vitoria">Vitória</option>
                                    <option value="vila_velha">Vila Velha</option>
                                    <option value="rio_janeiro">Rio de Janeiro</option>
                                </select>
                            </div>

                        </div>

                        <div class="right-form-column">
                            
                            <div class="map-section-title">Localização:</div>
                            <div class="map-wrapper-box">
                                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3741.8711812821217!2d-40.29410182390886!3d-20.305619150159424!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0xb8167bcbe632bb%3A0x6bba847c234a413!2zVitDs3JpYSwgRVM!5e0!3m2!1spt-BR!2sbr!4v1719056000000!5m2!1spt-BR!2sbr" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
                            </div>

                            <div class="photos-container-box">
                                <div class="photos-box-title">Fotos</div>
                                
                                <div class="photos-grid-layout">
                                    <div class="main-upload-trigger" onclick="triggerUploadAlert()">
                                        <i class="fa-solid fa-image-user"></i>
                                        <i class="fa-solid fa-circle-plus"></i>
                                        <span>Adicione a imagem aqui</span>
                                    </div>

                                    <div class="secondary-thumbnails-grid">
                                        <div class="thumb-upload-slot">
                                            <i class="fa-regular fa-image"></i>
                                            <button type="button" class="btn-delete-thumb" onclick="removeThumb(event, this)"><i class="fa-solid fa-trash-can"></i></button>
                                        </div>
                                        <div class="thumb-upload-slot">
                                            <i class="fa-regular fa-image"></i>
                                            <button type="button" class="btn-delete-thumb" onclick="removeThumb(event, this)"><i class="fa-solid fa-trash-can"></i></button>
                                        </div>
                                        <div class="thumb-upload-slot">
                                            <i class="fa-regular fa-image"></i>
                                            <button type="button" class="btn-delete-thumb" onclick="removeThumb(event, this)"><i class="fa-solid fa-trash-can"></i></button>
                                        </div>
                                        <div class="thumb-upload-slot">
                                            <i class="fa-regular fa-image"></i>
                                            <button type="button" class="btn-delete-thumb" onclick="removeThumb(event, this)"><i class="fa-solid fa-trash-can"></i></button>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="text-end">
                                <button type="submit" class="btn-submit-save">
                                    <span>Salvar</span>
                                </button>
                            </div>

                        </div>

                    </div>
                </form>

            </div>

        </div>
    </main>

    <script>
        // Controla exibição do campo de preço baseado no checkbox gratuito
        function togglePriceInput(checkbox) {
            const priceInput = document.getElementById('txtPreco');
            if (checkbox.checked) {
                priceInput.style.display = 'none';
                priceInput.removeAttribute('required');
            } else {
                priceInput.style.display = 'block';
                priceInput.setAttribute('required', 'true');
            }
        }

        // Simulação do gatilho de upload de mídia
        function triggerUploadAlert() {
            alert("Disparar seletor de arquivos do sistema operacional para carregar nova foto.");
        }

        // Remove miniatura com parada de propagação para não ativar clique no slot pai
        function removeThumb(event, button) {
            event.stopPropagation();
            if(confirm("Remover esta imagem?")) {
                const slot = button.closest('.thumb-upload-slot');
                slot.style.opacity = "0.3";
                button.remove();
            }
        }

        // Submissão do formulário
        function handleSubmit(event) {
            event.preventDefault();
            alert("Local cadastrado com sucesso no banco de dados da plataforma!");
            window.location.href = "admin-locais.html";
        }

        // Injeção dinâmica do menu superior
        fetch('header.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('header').innerHTML = data;
            })
            .catch(() => {
                document.getElementById('header').innerHTML = `
                    <nav style="padding: 20px 50px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.6); border-bottom: 1px solid rgba(255,255,255,0.1);">
                        <a href="admin-locais.html" style="color: white; font-weight: 700; font-size: 1.5rem; text-decoration: none; font-family: 'Outfit';">TripBrasil Admin</a>
                        <div style="display: flex; gap: 30px; font-family: 'Outfit';">
                            <a href="admin-locais.html" style="color: #70AE6E; text-decoration: none; font-weight: 600;">Gestão de Locais</a>
                            <a href="#" style="color: white; text-decoration: none; opacity: 0.8;">Configurações</a>
                        </div>
                    </nav>
                `;
            });
    </script>
</body>

</html>
