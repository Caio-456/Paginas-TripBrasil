<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TripBrasil - Entrar</title>

<link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:wght@400;500;700&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;

    font-family: 'Red Hat Display', sans-serif;

    background:
        linear-gradient(
            rgba(0,0,0,0.45),
            rgba(0,0,0,0.45)
        ),
        url('assets/img/fundo.webp');

    background-size: cover;
    background-position: center;
    background-attachment: fixed;

    min-height: 100vh;
}

.login-page {
    min-height: 100vh;

    display: flex;
    justify-content: center;
    align-items: center;

    padding: 120px 20px 40px;
}

.login-card {

    width: 100%;
    max-width: 450px;

    padding: 45px;

    border-radius: 24px;

    background: rgba(255,255,255,0.12);

    backdrop-filter: blur(15px);

    border: 1px solid rgba(255,255,255,0.2);

    color: white;

    box-shadow:
        0 10px 30px rgba(0,0,0,0.2);
}

.back-button {

    color: rgba(255,255,255,0.85);

    text-decoration: none;

    font-weight: 500;
}

.back-button:hover {
    color: white;
}

.login-card h1 {

    font-family: 'Outfit', sans-serif;

    margin-bottom: 10px;
}

.login-card p {

    color: rgba(255,255,255,0.85);

    margin-bottom: 35px;

    line-height: 1.6;
}

form {

    display: flex;
    flex-direction: column;

    gap: 18px;
}

input {

    padding: 16px;

    border-radius: 12px;

    border: 1px solid rgba(255,255,255,0.2);

    background: rgba(255,255,255,0.12);

    color: white;

    font-size: 16px;
}

input::placeholder {

    color: rgba(255,255,255,0.7);
}

input:focus {

    outline: none;

    border-color: #70AE6E;
}

.forgot-password {

    text-decoration: none;

    color: #9bd799;

    text-align: right;

    font-size: 14px;
}

button {

    border: none;

    cursor: pointer;

    transition: 0.3s;
}

form button {

    background: #70AE6E;

    color: white;

    padding: 16px;

    border-radius: 12px;

    font-size: 16px;

    font-weight: 700;
}

form button:hover {

    background: #5a9758;

    transform: translateY(-2px);
}

.divider {

    text-align: center;

    margin: 25px 0;

    color: rgba(255,255,255,0.8);
}

.google-button {

    width: 100%;

    display: flex;
    justify-content: center;
    align-items: center;

    gap: 10px;

    padding: 15px;

    border-radius: 12px;

    background: rgba(255,255,255,0.12);

    border: 1px solid rgba(255,255,255,0.2);

    color: white;
}

.google-button:hover {

    background: rgba(255,255,255,0.2);
}

.google-button img {

    width: 20px;
}

.signup {

    text-align: center;

    margin-top: 25px;

    color: rgba(255,255,255,0.85);
}

.signup a {

    color: #9bd799;

    font-weight: 700;

    text-decoration: none;
}
</style>
</head>


<body>
    <div id="header"></div>

    <main class="login-page">

        <div class="login-card">

            <a href="home.html" class="back-button">
                <img src="./assets/img/seta.svg" alt="voltar" class="icon" width="30" height="30">
            </a>


            <h1>Bem-vindo de volta</h1>

            <p>
                Continue sua jornada e descubra
                novos destinos pelo Brasil.
            </p>

            <form>

                <input
                    type="email"
                    placeholder="E-mail ou usuário"
                    required>

                <input
                    type="password"
                    placeholder="Senha"
                    required>

                <a href="#" class="forgot-password">
                    Esqueceu sua senha?
                </a>

                <button type="submit">
                    Entrar
                </button>

            </form>

            <div class="divider">
                ou
            </div>

            <button class="google-button">

                <img
                    src="https://www.google.com/favicon.ico"
                    alt="Google">

                Continuar com Google

            </button>

            <div class="signup">

                Não possui uma conta?

                <a href="#">
                    Cadastre-se
                </a>

            </div>

        </div>

    </main>

</body>
</html>
<script>
fetch('header.html')
  .then(response => {
    if (!response.ok) throw new Error("Erro ao carregar cabeçalho");
    return response.text();
  })
  .then(data => {
    document.getElementById('header').innerHTML = data;
  })
  .catch(err => console.error(err));
</script>
