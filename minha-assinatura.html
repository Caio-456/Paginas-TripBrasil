<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TripBrasil - Plano Viajante</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Red+Hat+Display:wght@400;500;700&display=swap"
        rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Red Hat Display', sans-serif;
            color: white;
        }

.plano-page {
    min-height: 100vh;

    background:
        linear-gradient(rgba(0, 0, 0, .55),
            rgba(0, 0, 0, .55)),
        url('assets/img/fundo.webp');

    background-size: cover;
    background-position: center;

    display: flex;
    align-items: center;

    padding: 130px 5% 60px;
}
        .container {
            max-width: 1400px;
            margin: auto;
        }

        .voltar {
            font-size: 2rem;
            text-decoration: none;
            color: white;
            display: inline-block;
            margin-bottom: 20px;
        }

        .titulo {
    font-family: 'Outfit', sans-serif;
    font-size: 3rem;
    margin-bottom: 40px;
    color: white;
}

        .conteudo {
            display: grid;
            grid-template-columns: 420px 1fr;
            gap: 50px;
            align-items: start;
        }

.card {
    background: rgba(255, 255, 255, 0.10);
    backdrop-filter: blur(15px);
    border: 1px solid rgba(255, 255, 255, 0.20);
    border-radius: 28px;
    overflow: hidden;
    margin-bottom: 25px;
    color: white;
}

.card-header {
    background: transparent;
    border-bottom: 1px solid rgba(255,255,255,0.12);
    padding: 20px;
    text-align: center;
    font-weight: 700;
    font-size: 1.2rem;
    color: white;
}

.card-body {
    padding: 25px;
}

.valor {
    font-size: 2rem;
    font-weight: 700;
    color: white;
}

.linha {
    border-top: 1px solid rgba(255,255,255,0.12);
    margin: 20px 0;
}

.subtitulo {
    font-size: 1.1rem;
    font-weight: 700;
    color: white;
}

.texto {
    color: rgba(255,255,255,0.85);
}

        .pagamento {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 15px;
}

        .botoes {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .btn {
    background: #70AE6E;
    border: none;
    color: white;
    padding: 16px 32px;
    border-radius: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover {
    background: #5A9758;
    transform: translateY(-2px);
}
        .galeria {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
        }

  .imagem {
    overflow: hidden;
    border-radius: 28px;
    border: 1px solid rgba(255,255,255,0.20);
    box-shadow: 0 8px 30px rgba(0,0,0,.25);
}

        .imagem img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .vertical {
            height: 420px;
        }

        .media {
            height: 190px;
        }

        .pequena {
            height: 120px;
        }

        .coluna {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        @media(max-width: 992px) {

            .conteudo {
                grid-template-columns: 1fr;
            }

            .galeria {
                grid-template-columns: repeat(2, 1fr);
            }

            .titulo {
                font-size: 2.2rem;
            }
        }

        @media(max-width: 768px) {

            .galeria {
                grid-template-columns: 1fr;
            }

            .vertical,
            .media,
            .pequena {
                height: 250px;
            }

            .pagamento {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>

    <div id="header"></div>

    <main class="plano-page">

        <div class="container">

            <a href="#" class="voltar">←</a>

            <h1 class="titulo">
                Obrigado por assinar o Plano Viajante!
            </h1>

            <div class="conteudo">

                <div>

                    <div class="card">

                        <div class="card-header">
                            Seu Plano
                        </div>

                        <div class="card-body">

                            <div class="valor">
                                R$ 9,99 / mês
                            </div>

                            <div class="linha"></div>

                            <div class="subtitulo">
                                Próximo pagamento
                            </div>

                            <p class="texto">
                                O valor de R$9,99 deve ser pago até a data:
                                01/01/2027
                            </p>

                        </div>

                    </div>

                    <div class="card">

                        <div class="card-header">
                            Pagamentos
                        </div>

                        <div class="card-body">

                            <div class="pagamento">

                                <div>
                                    <strong>Forma de pagamento</strong>
                                    <br>
                                    V****0101
                                </div>

                                <div>
                                    <a href="#" style="color:#70AE6E;font-weight:700;text-decoration:none;">
                                        Cancelar assinatura
                                    </a>
                                </div>

                            </div>

                        </div>

                    </div>

                    <div class="botoes">

                        <button class="btn">
                            Criar roteiro
                        </button>

                        <button class="btn">
                            Roteiros
                        </button>

                        <button class="btn">
                            Fazer sugestão
                        </button>

                    </div>

                </div>

                <div class="galeria">

                    <div class="imagem vertical">
                        <img src="assets/img/plano/cataratas.webp" alt="">
                    </div>

                    <div class="coluna">

                        <div class="imagem media">
                            <img src="assets/img/plano/cristo.webp" alt="">
                        </div>

                        <div class="imagem media">
                            <img src="assets/img/plano/beto-carrero.webp" alt="">
                        </div>

                    </div>

                    <div class="coluna">

                        <div class="imagem pequena">
                            <img src="assets/img/plano/praia.webp" alt="">
                        </div>

                        <div class="imagem pequena">
                            <img src="assets/img/plano/barco.webp" alt="">
                        </div>

                        <div class="imagem pequena">
                            <img src="assets/img/plano/pelourinho.webp" alt="">
                        </div>

                    </div>

                </div>

            </div>

        </div>

    </main>

    <script>
        fetch('header.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('header').innerHTML = data;
            });
    </script>

</body>

</html>
