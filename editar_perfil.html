<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>TripBrasil - Editar Perfil</title>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Red+Hat+Display:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Red Hat Display', sans-serif;
            color: white;
            min-height: 100vh;
            background-color: #0c0c0c;
        }

        /* HEADER FIXO E TRANSLÚCIDO */
        #header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1100;
            background: rgba(0, 0, 0, 0.2) !important;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        /* HERO / BACKGROUND */
        .hero {
            min-height: 100vh;
            width: 100%;
            background:
                linear-gradient(rgba(0, 0, 0, 0.65), rgba(0, 0, 0, 0.65)),
                url('assets/img/fundo.webp'),
                url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=1920');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            padding-top: 120px; 
            padding-bottom: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* CARD DE PERFIL AMPLIADO EM VIDRO */
        .profile-card {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 40px;
            padding: 50px 60px;
            position: relative;
            width: 100%;
            max-width: 950px; 
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
        }

        /* BOTÃO VOLTAR */
        .btn-back {
            position: absolute;
            top: 30px;
            left: 30px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 45px;
            height: 45px;
            z-index: 20;
        }

        .btn-back:hover {
            background: white;
            color: black;
            transform: translateX(-5px);
        }

        /* IDENTIFICADOR SUPERIOR DA TELA */
        .page-badge {
            background: rgba(255, 255, 255, 0.15);
            color: white;
            font-family: 'Outfit', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 50px;
            padding: 10px 24px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-left: 45px; 
            margin-bottom: 40px;
        }

        /* TEXTOS DOS RÓTULOS (LABELS) */
        .form-label-custom {
            font-family: 'Outfit', sans-serif;
            font-size: 1.2rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 8px;
            display: block;
        }

        /* INPUTS ESTILIZADOS TRANSLÚCIDOS */
        .form-control-custom {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 14px;
            color: white;
            font-family: 'Red Hat Display', sans-serif;
            font-size: 1.1rem;
            padding: 14px 20px;
            width: 100%;
            transition: all 0.3s ease;
        }

        .form-control-custom:focus {
            background: rgba(255, 255, 255, 0.15);
            border-color: #70AE6E;
            box-shadow: 0 0 15px rgba(112, 174, 110, 0.3);
            outline: none;
            color: white;
        }

        /* FOTO DE PERFIL LADO DIREITO */
        .avatar-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
        }

        .profile-avatar {
            width: 260px;
            height: 260px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            margin-bottom: 20px;
        }

        /* BOTÃO SALVAR ALTERAÇÕES */
        .btn-save-custom {
            background: rgba(218, 255, 222, 0.85);
            color: #0c0c0c;
            font-family: 'Outfit', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            border: none;
            border-radius: 50px;
            padding: 16px 45px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
            margin-top: 20px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn-save-custom:hover {
            background: rgba(218, 255, 222, 1);
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(112, 174, 110, 0.4);
        }

        /* TOAST DE SUCESSO PERSONALIZADO (MENSAGEM POPUP) */
        .custom-toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(20, 40, 25, 0.85);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid #70AE6E;
            color: #daffde;
            padding: 16px 28px;
            border-radius: 16px;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            gap: 12px;
            transform: translateY(150px);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 2000;
        }

        .custom-toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        @media (max-width: 991px) {
            .avatar-section { margin-top: 40px; }
            .profile-card { padding: 40px 30px; margin: 0 15px; }
            .page-badge { margin-left: 55px; }
            .custom-toast { left: 20px; right: 20px; bottom: 20px; text-align: center; justify-content: center; }
        }
    </style>
</head>

<body>

    <div id="header"></div>

    <div id="successToast" class="custom-toast">
        <i class="fa-solid fa-circle-check" style="color: #70AE6E; font-size: 1.4rem;"></i>
        <span>Alterações salvas com sucesso!</span>
    </div>

    <main class="hero">
        <div class="container d-flex justify-content-center">
            
            <div class="profile-card">
                
                <button class="btn-back" onclick="window.history.back()" title="Voltar">
                    <i class="fa-solid fa-arrow-left"></i>
                </button>

                <div class="page-badge">
                    <i class="fa-solid fa-user-pen"></i>
                    <span>Editar dados</span>
                </div>

                <form id="editProfileForm">
                    <div class="row align-items-center">
                        
                        <div class="col-lg-6">
                            <div class="row g-4">
                                <div class="col-12">
                                    <label class="form-label-custom">Nome:</label>
                                    <input type="text" class="form-control-custom" value="Mariana Silva" required>
                                </div>
                                
                                <div class="col-12">
                                    <label class="form-label-custom">Email:</label>
                                    <input type="email" class="form-control-custom" value="marianamssilva02@gmail.com" required>
                                </div>
                                
                                <div class="col-12">
                                    <label class="form-label-custom">Celular:</label>
                                    <input type="text" class="form-control-custom" value="(27) 999356709">
                                </div>
                                
                                <div class="col-6">
                                    <label class="form-label-custom">Estado:</label>
                                    <input type="text" class="form-control-custom" value="ES">
                                </div>
                                
                                <div class="col-6">
                                    <label class="form-label-custom">Cidade:</label>
                                    <input type="text" class="form-control-custom" value="Vitória">
                                </div>
                            </div>
                        </div>

                        <div class="col-lg-6">
                            <div class="avatar-section">
                                <img src="assets/img/mariana.webp" alt="Mariana Silva" class="profile-avatar" onerror="this.src='https://images.unsplash.com/photo-1494790108377-be9c29b29330?q=80&w=400'">
                            </div>
                        </div>

                        <div class="col-12 text-start mt-4">
                            <button type="submit" class="btn-save-custom">
                                <i class="fa-solid fa-floppy-disk"></i>
                                <span>Salvar alterações</span>
                            </button>
                        </div>

                    </div>
                </form>

            </div>

        </div>
    </main>

    <script>
        // SCRIPT PARA INTERCEPTAR O ENVIO E MOSTRAR A MENSAGEM
        document.getElementById('editProfileForm').addEventListener('submit', function(event) {
            event.preventDefault(); // Evita o recarregamento real da página

            const toast = document.getElementById('successToast');
            toast.classList.add('show'); // Mostra a mensagem na tela

            // Esconde a mensagem automaticamente após 4 segundos
            setTimeout(() => {
                toast.classList.remove('show');
            }, 4000);
        });

        // Injeção dinâmica do menu
        fetch('header.html')
            .then(response => {
                if (!response.ok) throw new Error("Erro de requisição");
                return response.text();
            })
            .then(data => {
                document.getElementById('header').innerHTML = data;
            })
            .catch(err => {
                document.getElementById('header').innerHTML = `
                    <nav style="padding: 20px 50px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.5); border-bottom: 1px solid rgba(255,255,255,0.1);">
                        <a href="#" style="color: white; font-weight: 700; font-size: 1.5rem; text-decoration: none; font-family: 'Outfit';">TripBrasil</a>
                        <div style="display: flex; gap: 30px;">
                            <a href="#" style="color: white; text-decoration: none; opacity: 0.8;">Explorar</a>
                            <a href="#" style="color: #70AE6E; text-decoration: none; font-weight: 600;">Perfil</a>
                        </div>
                    </nav>
                `;
            });
    </script>
</body>
</html>
