<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TripBrasil - Redefinir Senha</title>

<link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:wght@400;500;700&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    font-family:'Red Hat Display', sans-serif;
    background:#fff;
}

.navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:22px 70px;
    border-bottom:2px solid #000;
}

.navbar img{
    height:55px;
}

.navbar nav a{
    margin:0 16px;
    text-decoration:none;
    color:#000;
    font-size:16px;
    font-weight:700;
}

.container{
    height:85vh;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
}

.back{
    position:absolute;
    top:40px;
    left:70px;
    font-size:28px;
    cursor:pointer;
}

.recovery-box{
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
}

.recovery-box h1{
    margin:0;
    font-size:42px;
    font-weight:500;
}

.recovery-box p{
    margin:12px 0 45px;
    font-size:22px;
}

.input-box{
    width:420px;
    display:flex;
    align-items:center;
    gap:12px;
    border:1.8px solid #000;
    padding:14px 16px;
    background:#fff;
    margin-bottom:16px;
}

.icon{
    width:26px;
    height:26px;
    fill:#000;
    flex-shrink:0;
}

.input-box input{
    border:none;
    outline:none;
    width:100%;
    font-size:18px;
    font-family:'Red Hat Display', sans-serif;
}

button{
    margin-top:24px;
    background:#f4b532;
    border:none;
    border-radius:35px;
    padding:14px 42px;
    font-size:24px;
    font-family:'Red Hat Display', sans-serif;
    font-weight:700;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

        body {
            font-family: 'Red Hat Display';
            margin: 0;
            padding: 0;
            /* Fundo com imagem e fading */
            background-image: linear-gradient(rgba(255,255,255,0.8), rgba(255,255,255,0.5)), url('assets/img/fundo.webp');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        header {
            background-color: rgba(245, 245, 245, 0.9);
            border-bottom: 1px solid #ccc;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav a {
            margin: 0 10px;
            text-decoration: none;
            color: #333;
            font-weight: bold;
        }

        h1 {
            font-family: 'Outfit';
            font-size: 10vw;
            margin-top: 5vw;
            margin-bottom: 5px;
            line-height: 1.2;
        }

        h2 {
            font-family: 'Red Hat Display';
            font-size: 3vw;
            margin-top: 5px;  
            margin-bottom: 5px;
            line-height: 1.2;
        }

        .left-padding {
            padding-left: 4vw;
        }

        button {
            background-color: #70AE6E;
            border: none;
            color: white;
            padding: 14px 28px;
            text-align: center;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.2s;
        }

        button:hover {
            background-color: #50A04E;
            transform: translateY(-2px);
        }
</style>
</head>

<body>

<div id = "header"></div>

<div class="container">

    <div class="back">←</div>

    <div class="recovery-box">

        <h1>Redefinir Senha</h1>

        <p>
            Digite e confirme sua nova senha abaixo.
        </p>

        <div class="input-box">

            <svg class="icon" viewBox="0 0 24 24">
                <path d="M17 8h-1V6a4 4 0 0 0-8 0v2H7a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-9a2 2 0 0 0-2-2zm-6 8.73V17a1 1 0 0 0 2 0v-.27a2 2 0 1 0-2 0zM9 8V6a3 3 0 0 1 6 0v2H9z"/>
            </svg>

            <input type="password" placeholder="Nova Senha">

        </div>

        <div class="input-box">

            <svg class="icon" viewBox="0 0 24 24">
                <path d="M17 8h-1V6a4 4 0 0 0-8 0v2H7a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-9a2 2 0 0 0-2-2zm-6 8.73V17a1 1 0 0 0 2 0v-.27a2 2 0 1 0-2 0zM9 8V6a3 3 0 0 1 6 0v2H9z"/>
            </svg>

            <input type="password" placeholder="Confirmar Senha">

        </div>

        <button>Salvar Alterações</button>

    </div>

</div>

</body>
<script>
fetch('header.html')
  .then(response => {
    if (!response.ok) throw new Error("Erro ao carregar cabeçalho");
    return response.text();
  })
  .then(data => {
    document.getElementById('header').innerHTML = data;
  })
  .catch(err => console.error(err));
</script>
</html>
