<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Cadastrar Local - TripBrasil</title>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Red+Hat+Display:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Red Hat Display', sans-serif;
            color: white;
            min-height: 100vh;
            background-color: #0c0c0c;
        }

        /* HEADER FIXO E TRANSLÚCIDO */
        #header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1100;
            background: rgba(0, 0, 0, 0.2) !important;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        /* HERO / BACKGROUND */
        .hero {
            min-height: 100vh;
            width: 100%;
            background:
                linear-gradient(rgba(0, 0, 0, 0.65), rgba(0, 0, 0, 0.65)),
                url('assets/img/fundo.webp'),
                url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?q=80&w=1920'); /* Fallback montanha */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            padding-top: 110px; 
            padding-bottom: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* CARD PRINCIPAL AMPLIADO (GLASSMORPHISM) */
        .main-card {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 40px;
            padding: 40px 50px;
            position: relative;
            width: 100%;
            max-width: 1200px; /* Card largo conforme o rascunho */
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
        }

        /* BOTÃO VOLTAR */
        .btn-back {
            position: absolute;
            top: 25px;
            left: 25px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            z-index: 20;
        }

        .btn-back:hover {
            background: white;
            color: black;
            transform: translateX(-5px);
        }

        /* TÍTULO DA PÁGINA */
        .page-title {
            font-family: 'Outfit', sans-serif;
            font-size: 2.2rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 35px;
            color: #70AE6E;
        }

        /* FORMULÁRIO */
        .form-label-custom {
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            margin-bottom: 8px;
            color: rgba(255, 255, 255, 0.9);
        }

        .form-control-custom {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: white;
            padding: 10px 15px;
            transition: 0.3s;
        }

        .form-control-custom:focus {
            background: rgba(255, 255, 255, 0.15);
            border-color: #70AE6E;
            box-shadow: 0 0 10px rgba(112, 174, 110, 0.3);
            outline: none;
            color: white;
        }

        /* CHECKBOX E RADIO ESTILIZADOS */
        .form-check-input:checked {
            background-color: #70AE6E;
            border-color: #70AE6E;
        }

        /* MAPA */
        .map-section h5, .photo-section h5 {
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .map-container {
            width: 100%;
            height: 200px;
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .map-container iframe {
            width: 100%;
            height: 100%;
            border: none;
            filter: grayscale(1) invert(0.92) contrast(1.2);
        }

        /* FOTOS UPLOAD */
        .upload-main {
            width: 100%;
            height: 180px;
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.03);
            cursor: pointer;
            transition: 0.3s;
        }

        .upload-main:hover {
            border-color: #70AE6E;
            background: rgba(255, 255, 255, 0.08);
        }

        .photo-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 15px;
        }

        .photo-thumb {
            aspect-ratio: 1;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-delete-photo {
            position: absolute;
            top: 5px;
            right: 5px;
            background: rgba(255, 0, 0, 0.7);
            border: none;
            color: white;
            width: 22px;
            height: 22px;
            border-radius: 5px;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* BOTÃO SALVAR */
        .btn-save {
            background: #70AE6E;
            color: white;
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            padding: 12px 60px;
            border: none;
            border-radius: 50px;
            transition: 0.3s;
            margin-top: 20px;
        }

        .btn-save:hover {
            background: #5A9758;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(112, 174, 110, 0.3);
        }

        /* TOAST SUCESSO */
        .custom-toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(20, 40, 25, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid #70AE6E;
            color: #daffde;
            padding: 15px 25px;
            border-radius: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            transform: translateY(150px);
            transition: 0.4s;
            z-index: 2000;
        }

        .custom-toast.show {
            transform: translateY(0);
        }

        @media (max-width: 991px) {
            .main-card { padding: 40px 20px; }
            .hero { padding-top: 90px; }
        }
    </style>
</head>

<body>

    <div id="header"></div>

    <div id="toast" class="custom-toast">
        <i class="fa-solid fa-circle-check"></i>
        <span>Cadastro realizado com sucesso!</span>
    </div>

    <main class="hero">
        <div class="container d-flex justify-content-center">
            
            <div class="main-card">
                <button class="btn-back" onclick="window.history.back()">
                    <i class="fa-solid fa-arrow-left"></i>
                </button>

                <h1 class="page-title">Cadastro de Local</h1>

                <form id="cadastroForm">
                    <div class="row g-5">
                        
                        <div class="col-lg-6">
                            <div class="mb-3">
                                <label class="form-label-custom">Nome:</label>
                                <input type="text" class="form-control-custom w-100" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label-custom">Descrição:</label>
                                <textarea class="form-control-custom w-100" rows="3" required></textarea>
                            </div>

                            <div class="mb-4">
                                <label class="form-label-custom d-block">Tipo:</label>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="tipo" id="estab" value="estabelecimento" checked>
                                    <label class="form-check-label" for="estab">Estabelecimento</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="tipo" id="ponto" value="ponto-turistico">
                                    <label class="form-check-label" for="ponto">Ponto turístico</label>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label class="form-label-custom d-block">Preço de entrada:</label>
                                <div class="d-flex align-items-center gap-3">
                                    <input type="text" class="form-control-custom" style="width: 120px;" placeholder="R$ 0,00">
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" id="gratis">
                                        <label class="form-check-label" for="gratis">Gratuito</label>
                                    </div>
                                </div>
                            </div>

                            <div class="row mb-4">
                                <div class="col-md-6">
                                    <label class="form-label-custom">Estado:</label>
                                    <select class="form-control-custom w-100">
                                        <option selected disabled>Selecione</option>
                                        <option>Espírito Santo</option>
                                        <option>Minas Gerais</option>
                                        <option>Rio de Janeiro</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label-custom">Cidade:</label>
                                    <select class="form-control-custom w-100">
                                        <option selected disabled>Selecione</option>
                                        <option>Vitória</option>
                                        <option>Vila Velha</option>
                                        <option>Cachoeiro</option>
                                    </select>
                                </div>
                            </div>

                            <button type="submit" class="btn-save">Salvar</button>
                        </div>

                        <div class="col-lg-6">
                            
                            <div class="map-section mb-4">
                                <h5>Localização:</h5>
                                <div class="map-container">
                                    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3741.884501235142!2d-40.3015423!3d-20.320478!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMjDCsDE5JzEzLjciUyA0MMKwMTgnMDUuNiJX!5e0!3m2!1spt-BR!2sbr!4v1624360000000"></iframe>
                                </div>
                            </div>

                            <div class="photo-section">
                                <h5>Fotos:</h5>
                                <div class="upload-main">
                                    <i class="fa-solid fa-cloud-arrow-up mb-2" style="font-size: 2rem; opacity: 0.5;"></i>
                                    <span>Adicione a imagem aqui</span>
                                </div>

                                <div class="photo-grid">
                                    <div class="photo-thumb">
                                        <button class="btn-delete-photo"><i class="fa-solid fa-trash"></i></button>
                                    </div>
                                    <div class="photo-thumb">
                                        <button class="btn-delete-photo"><i class="fa-solid fa-trash"></i></button>
                                    </div>
                                    <div class="photo-thumb">
                                        <button class="btn-delete-photo"><i class="fa-solid fa-trash"></i></button>
                                    </div>
                                </div>
                            </div>

                        </div>

                    </div>
                </form>

            </div>

        </div>
    </main>

    <script>
        // Injeção do menu
        fetch('header.html')
            .then(res => res.text())
            .then(data => document.getElementById('header').innerHTML = data)
            .catch(() => {
                document.getElementById('header').innerHTML = `
                    <nav style="padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.5); border-bottom: 1px solid rgba(255,255,255,0.1);">
                        <a href="#" style="color: white; font-weight: 700; font-size: 1.5rem; text-decoration: none; font-family: 'Outfit';">TripBrasil</a>
                        <div style="display: flex; gap: 20px; font-family: 'Red Hat Display';">
                            <a href="#" style="color: white; text-decoration: none; opacity: 0.8;">Explorar</a>
                            <a href="#" style="color: #70AE6E; text-decoration: none; font-weight: 600;">Anuncie</a>
                            <a href="#" style="color: white; text-decoration: none; opacity: 0.8;">Perfil</a>
                        </div>
                    </nav>
                `;
            });

        // Simulação de Salvamento
        document.getElementById('cadastroForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        });
    </script>
</body>

</html>
